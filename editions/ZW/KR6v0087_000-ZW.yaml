body:
  text: 華嚴略疏卷第一整理者悟緣題解華嚴略疏佛經註疏作者不詳原著卷數不詳本文獻註疏晉譯華嚴經未為我國歷代大藏經所收保存在敦煌遺書中現知存有兩件一北敦號辰號縮微膠卷號首殘尾存尾題華嚴略疏卷第一尾有題記比丘法淵供養流通卷中有朱筆校改字所疏自晉譯華嚴經的世間淨眼品第一首殘至賢首品第八二斯號首尾俱全首題華嚴略疏卷第三尾題略疏卷第三尾有題記淵許疏銓晉譯華嚴經之十地品第二十二兩件遺書筆跡相同內容呼應題記相關原屬同一部註疏當無疑問本文獻主要提挈晉譯華嚴的要點解釋名相亦含有分析科判的內容從總體看較為簡明扼要故謂略疏但註疏精要且多依十地經論為證應為地論宗義學高僧所撰本略疏書法簡古屬南北朝寫本題記不避唐高祖李淵之諱北敦號文內又有盧舍那者周名清淨圓滿智之語故該略疏的撰寫年代應在北周明帝建國起至北周武帝建德三年廢佛前關於本略疏的作者因新編諸宗教藏總錄東域傳燈目錄諸宗章疏錄等諸經錄均載有華嚴略疏四卷北齊鄴下大覺寺慧光撰續高僧傳卷二十一慧光傳亦載他曾撰華嚴經疏稱疏其奧旨而弘演導且據現存華嚴經之諸章疏對古來諸疏之科判的介紹唯有慧光疏之科判與本略疏相符故曾有研究者認為本略疏系慧光所撰但本略疏與署名為大覺寺沙門惠慧光述的日本寬文時代古抄花嚴經義記卷第一載大正藏第卷完全不類且慧光是北齊僧人年代略早故也有研究者認為本略疏或為北周著名地論師雲華寺釋僧猛所撰就篇幅而言本略疏卷三疏釋至十地品文字約相當於晉譯華嚴經的二分之一弱因此本略疏原著卷數可能為六卷左右與慧光疏也有差距自敦煌出土後日本大正藏將斯號收入第卷周叔迦於年在現代佛學上發表北敦號的錄文並附跋文於錄文中對殘缺的文字及原文的錯誤多有補正在跋文中則對該文獻之內容科判作者多所研究藏外佛教文獻第八輯先發表卷一的整理本卷三的整理本因故推遲發表卷一的底校本如下底本北敦號校本甲本周叔迦錄文載現代佛學年第期錄文法界境平等上二直云所為平等無量已下正明為堅固乘佛智乘為本故也障有二種初云離煩惱障其心清淨者離於智障煩惱障者有三四住異心之惑者而浮薄如皮礙於真用故云皮障也二者膚障恆沙之惑曀理轉深未盡理原故云膚障也三者骨障無明住地大惑之本曀理深極故云骨障諸節使山皆已摧滅者使乃塵沙或云有十亦可有三皆能驅馳使人名為使也五地已還斷害伴使不俱生煩惱與心為伴也六地七地斷於粗使是即心之惑俱生煩惱也八地已上斷於細使俱生煩惱上品也若依毗曇中就三界四諦明九十八使欲界見諦有三十二苦諦下有十使集諦有七滅諦下有七道諦下有八修道中有四使合有三十六使色界見諦下有二十八苦諦下有九集諦下有六滅諦下有六道諦下有七修道中有三合有三十一使無色界見諦下有二十八苦諦下有九集諦下有六滅諦下有六道諦下有七修道中有三合有三十一使總三界五行為九十八使也見苦斷二十八見集斷十九見滅斷十九見道斷二十二若廣辯其解惑位之高下但諸大乘經群籍無量對機布教根教千徒階位萬品難可備盡耳覩佛姿顏已下總釋上三覩應佛也所以者何者所以有此三種得益者何由如來大悲曠劫善攝眾生稟化來久故能平等行成應物無方斷障遣使入佛願海如涅槃經何以故如來恩重三千雖多恩重難報義無異也各隨本行皆得出要者要有五種一入住位出外凡之要二入初地出我見之要三入六地出有相之要四入八地出無相之要五入佛地位出生滅之要要者其也要其遠近悉由如來惠光明故若欲橫對要乃千徒耳乘解脫力入如來海者有二義一由具前三德名乘解脫力二者據眾要為言乘無垢解力入如來智海故云於佛法門悉得自在也列名嘆德既在於上從善海摩醯首羅天已下訖海惠第二明獻供也中有二種意一料簡有供無供之別二料簡偈中嘆佛數有增減初明有供無供之別者自下一十八眾皆有所賷隱而不列餘有二十眾者明獻供也而供有二種所謂財法財有內外法有理教此十大天王皆就所得法門說偈嘆佛即用嘆佛顯理利益眾生稱悅聖意故稱供也如食怡悅神性保安器度故也第二明偈中嘆佛數有增減者自下與偈誦前所得法門明義對機廣略有別初首羅二十行果實十九偈遍淨二十二光音二十偈大梵十六行自在二十偈化樂二十二兜率十六偈夜摩十六行帝釋二十偈日天二十二月天十六偈持國二十行鳩槃二十偈博叉二十行毗沙十六偈力士二十行普賢二十偈海惠十九行諸王不說偈偈既多少不同頌上法門亦有廣略或一偈頌上一法門或有二偈頌上一法門或有三偈頌上一法門雖初一王說偈皆通頌諸王法門義也獻法供者非直以偈為是上長行十法門中各皆解佛功德證佛所證乘佛所乘其德與普賢不異今但云各嘆所得法門者欲彰法門無邊證人無限是故各互舉一相豈無總持三世平等解也如總嘆中以具總顯首羅天於法界虛空寂靜方便光明法門而得自在法界者一切萬法色心無作善惡無記若有若無一切所為智知皆為法界也虛空寂靜者實智也方便光明者方便行也於空有中生智用自在名法門也法門者宜以總容別以總為門今此唯以教能詮理理能通解解能通人故為門也自下諸門皆爾人法雖眾觀獻法供並以嘆佛應實二身及以往因三輪益物為宗所以而名嘆佛為獻者食以怡悅人情保安器度為義此感恩重嘆佛古今因果理趣遠悅聖心保安法身器量復令眾生得見聞之益即是供也前嘆眾德時從人向天此嘆佛德從天向人此中亦應有財供經家略故不顯准下諸會皆具財法或欲倚互彰名耳就中十九番說偈初首羅果實光音毗沙此四皆初嘆法身後二嘆因也其餘遍淨化樂一十五天等或顯因在先果在於後或在初偈中三四乃至七八前顯其因行後還嘆果也首羅中初十八行嘆果後二行嘆往因初十八行中前二行嘆法身次十六行嘆應身形教及淨土有所除得自下力士普賢雖疏中處分依經二偈頌上一章門與上諸王無異也力士得示現如來無量色像法門外護內毗偈有二十行初有六行嘆佛身業次有七行嘆口業次有七行眾生見聞形教之益興供養也普賢是此會稟說之主成就十二種不可思議法門初二為總前句外化後句自行下十法門釋前二義所謂出生初對一句釋初外化也詣諸佛所釋前能入自行也菩薩諸地已下第二對初句自行示現已下釋外化也持諸佛土已下第三對初句釋自行一切眾中已下釋外化於一念中已下第四對初句自行分別者外化也其身以下第五對初句自行一切已下外化也是十法門皆具三業自利之物五中初具不具相對次因果相對三境智相對四一念以下劫與諸根依正相對五身智相對也普賢偈有二十行初一行嘆佛依正次半行嘆僧寶充滿次半行嘆法寶利物不思議次九行重嘆佛寶次三行重嘆法寶次二行重嘆僧寶最後四行結佛法二寶略不結僧寶就海惠中有二初長行二說偈長行中有三初列佛坐莊嚴具二列座中大眾三明獻供第二座中有三句一者總列大眾二從其名曰已下別列十名三從如是已下還總結設諸供養已下第三供獻也供有二種初明財供不可稱結彼菩薩已下九句即是第二獻法供亦名列得道之眾亦名嘆德皆嘆自分三業行願自利之德略不顯利他也故第九句云是名供養諸佛也嘆德九句中有三分德一始分德二住分德三滿分德清靜者自分德於佛者他分德悉入者教益也此三為始又得已下住分功德又得不可思議照明法門自分功德正住已下共分功德三世智地已下滿分功德具足已下滿分中初句無量功德已下滿中第二句常行已下滿中第三句悉已具足已下總結前九句也大力法愛者八地已上無功用行成無相之愛愛而不著也常行法界照萬有也畢竟空性者照空也空有解滿故云具足也偈有十九行直作嘆佛三業平等益物初一行嘆意業平等次十二行嘆身業平等後六行嘆口業平等皆以利物為宗即明三輪也上來至此同聞二義成上生下既在於上即是證信序竟動地已下第二明發起序也亦名如來序亦名經前序經前何以而來可有二意一有機病二由大慈雖有機病如來無慈則不動地諸王大眾則不興其念請大眾不集何得顯其果因行之義也以佛慈悲神力動地𢝷動眾情故有念請眾集酬答廣顯果因行利物也就中有三一總列動數二列數相三列獻供總中復有其三初顯能動二蓮華已下列所動三六種已下總列動數也所謂已下別列數相謂動涌震吼起覺一中有三起等起等遍起乃至於覺一中有三三六以為十八又令一切已下第三明獻供也就中有二初明財供二從此世界中已下列得道人亦名列法供也以其證道稱聖意故名為獻供財供有二一明此方供養二一切十方已下列他方供養各隨其力者隨感多少也法供養中復有其二初十句明此方法供二十方一切已下明他方法供前此方之中直作五對十句初靜亂相對二忻厭相對三怯勇相對四證不證相對五度未度相對此等十句皆嘆自利行願隱於利他也盧舍那佛品第二盧舍那者周名清靜圓滿智與釋迦一佛而異名寄化主以彰品目故曰盧舍那佛品又云毗廬為法盧舍為報釋迦為應也自下明其正說此品料簡有二一望宗遠生起二科文解義遠則有六科文有三六義者一機法相對二樂病相當三意旨相順四二教相成五伏本大解六悲心故起二科文解義者就中有三周說法從初已下至名號已來一周略明因果以勸於時第二從名號已下訖於十忍第二周廣明因果以勸於時第三從僧祗品已下訖於離世閒品已下明結勸修成顯前二宗以益經時若取法界重顯因果許萬舉勸流通初番中廣果而略因第二名號廣因而略果第三心王已下因果俱廣許是倚互彰義也法界重舉者不異前釋亦可得名廣略四周說法為於利鈍耳如大涅槃通取陳如三周因果無異也自有異體因果自有自體因果然既云自體寧有因果勝者但體用互興無義不攝德無不積故因果殊致與如佛性涅槃是自體因果緣修方便顯真實體為異體因果如金鑛爐冶榖禾水土皆有同異也然所以先果後因者勸於行人忻果行因故也下廣明因者勸於行人因圓則果滿也若依品初科釋由是果未竟淨行已下始顯因門心王已下重顯果門性起已下顯果正因法界已下流通也就此品中有三分一從初訖清淨法輪已來名序分二從爾時普賢菩薩承佛神力已下明正說真應圓果以不思議為宗三從乃往過去已下顯證流通也亦云顯圓果之因也初序分之中凡有六番長行及偈皆是發起義也初長行及偈明大眾念請第二長行及偈直明放光意在召眾第三長行及偈正明集眾第四長行及偈放眉間光顯現普賢於十方三業示於大眾堪是此會稟資之者第五長行及偈明奮迅菩薩領嘆如來於十方界三輪益物也第六長行及偈明普賢入定受加之義也若准下諸會皆有六義一處所二獻供三集眾四放光五說偈六入定此中序分應有六義與下相似而文小異者以此念請一長行及偈故有八番經文其八者何一上道場即是其處也二上顯財法即是獻供也三者動地四明念請五者放光六者集眾七者說偈八者入定此品通序如十地無異此道場獻供動地等即與盧舍一品為通序與下九會為序而九會之中復別有序正流通如論釋初地八分前六為序近與初地為序遂通九地為序而九地之中復別為序正流通也名號品中文不具六者處等不異於此也不思議已下不具六者顯前略後也然此之念請由上動地獻供而起起之所以備如前釋就中有三一從初已下明其念請二唯願已下請決之辭三音中說十八行偈嘆佛功德就前念請之中問有三十二句大問有四初之九句問真極圓果次九句問應化法身次十一句問應化所被後三句問因行也初問佛地者總問佛果一切功德安立如地也亦可廣生物善如佛地妙法唯佛所知故云境界也大陀羅尼之極故云持順益理周為行無畏三昧自在已下為佛勝等也示現菩提已下應道八相也六根者應身也光明音聲者聲光益物也諸佛智海已下就應化所及為問也佛智海者舉智以明所知也世界者眾生所依也眾生海者語等正報也法界方便海者巧化之極也佛海者舉主以明所化也波羅蜜海者化周彼岸也法門海者軌誥無方皆為通化故名法門現八相等為化身海亦可魔㝹魔身也名號壽量海者如此名號品壽命品說真果圓妙眾聖所歸故先問焉有真必應故次問應有應必有所化故次問化之所及也此果真應必有其因故次問行也因雖無量略問於二言一切菩薩所修海者據滿足因也發大乘心者據初心也初心是難故別問焉亦以圓果由於因備因備由於初心故問然也下答中先答真中九句十世界海已下答應九句即並答所被十句也最後乃往已下答因三句也然則一部之始終皆答上疑但後雖有諸菩薩重問大旨多同於此是以訖經多是答前後問也雖處異眾殊而見聞是同共為一部故得通答亦可為於利根一周答上根領解中下之流由自未悟是故諸菩薩等更須重問問辭無別答亦如前如似涅槃再周明常亦復無妨總別問答並通任情也所以供養具中復說偈問者明上諸菩薩疑問情殷故能感瑞令供具之中出自然音而請也亦以疑念之門唯可如來玄鋻自餘諸眾何容得知故令供具表上疑問普令大眾渴仰聖答也偈有十八行前六偈嘆請後十二行頌前大眾疑念之事偈中亦問三十二事但與長行疑問中前後廣略名句小異宗無二也從即於面門已下八中第五長行及偈放光召集他方眾也中有二分初明放光召眾二從佛神力已下說偈嘆佛初中四句一云知初心二光出所從三列光之數相有十種也四列他方見此面門及齒間者明教有總別也所以面門及齒間者表明多以言教為佛事也如來佛事者多以面門放光涅槃口光者止章斷句也偈有十九行中有二義初十偈明讚佛德後九偈勸勅聽也從爾時蓮華藏世界已下第六長行及偈明他方眾集也前直放光遍照十方此明因光新眾集也就中有二初長行列十方新眾因光來集二光中說二十偈嘆德初眾集中有二初明別列十方眾集二各有十億已下總結眾集也亦名嘆德也就一方中有八句一列世界海名二列佛剎名三顯佛號四列菩薩五為佛光開覺六明菩薩眷屬七明獻供八隨方就坐十方皆爾也就第二結嘆之中復有二一從如是已下總結嘆眾集並列財法供養眷屬等二明佛益物之方九種教化已下是也初化功之中總結上別先列塵數世界海次列菩薩次列妙雲次列淨光次列菩提次列其道次列眾生此之八句皆云塵數也即是嘆德不可思議事取九種法門教化者始從凡夫終於十地是所化眾生也自下有九種化宜六種對治深淺難測且復約位為九耳就中大判為三初三法門化地前化內外凡夫也次三法門化初地已上七地已還三忍位人也後三法門化八地已上終於十地二忍位人也初三中一法門在外凡之始邪定聚人也第二法門外凡之終不定聚人也第三法門內凡之位三賢菩薩正定聚人也次三法門者初一法門位在三地已還信忍行人也第二法門位在六地已還順忍行人也第三法門位在七地無生忍下品也後三法門者初一位在八地第二位在九地第三位在十地也教門對機理自萬差寧可復顯且寄大況約之為九可以是以具收也上云九種是化儀方軌自下六種對治是第二受化者蒙利也初功德能對治外凡眾生也第二功德能對治內凡夫人也此之二句總九句中初三化門地前內外凡夫為二也第三功能者對治六地已還為聲聞也第四功能對治七地為緣覺也此二功能收前三忍菩薩約之為二也第五功能者對治八地九地無生忍中上也第六功能者對治十地大寂忍下品也與佛同照故云盧舍那佛願性海中也此二收上後三化門以為二也若以實三乘者迴心在於初住解時種種對治釋異於前初治在外凡第二在內凡第三第四並在內凡此對治並在十住位中亦可配在住行向也第五對治在初地已上終於七地第六對治八地以上終於十地作此解時無機不收無藥不授何妨迴小在於三堅也若依此解前釋初略而後廣也前作二對治為略地上分四為廣也今解地前作四對治名前廣地上作二名後略也雖復六句廣略不同以解惑往判大宗有二以下下之智斷上上之惑以上上之智除下下之惑若論其起始微終著善惡具有論其斷也始粗終細亦通善惡耳且據始終起盡而辯中間對治縛脫不可具論縛解之意略顯於上也第二光中說偈偈有廿行中有二義初有一十二偈明功行滿足次有八行明神力普遍微塵毛孔中也從爾時世尊欲令一切菩薩大眾已下即是序中第七顯現普賢身相堪為此會稟說之人也依下諸會即是序中第七說偈嘆佛也中間雖有二菩薩說三長行即上處偈也最後四天下一長行者結眾集也初中有二一長行二說偈長行中有五句一明所為二明放光即是光之體相三光所及處四現一大蓮華五現一大菩薩若依此品上已有放光集眾竟此中更放眉間光者欲加示普賢顯中道義也顯現普賢收光足下者表明至極之道可傳於下也第二說偈嘆佛偈有六行皆嘆如來二身於十方界中現不思議益物也從爾時師子炎光奮迅音已下明說偈嘆佛也亦云領於十方三業益物也依下諸會即是偈讚之中第二番說偈也偈有十七行前三五言後十四七言也五七雖殊並嘆如來十方界說普賢行三業利物耳從爾時普賢於如來前坐蓮華藏師子坐已下第八普賢入定也就中有二初長行後二十行偈頌長行有二一明入定入三昧分是也二釋入定即加分是也初入定中有二一入定並列三昧名如來淨藏二列三昧照境乃至一切佛剎亦同於此就加分中有三初加之相所謂已下加之所為與智已下正三業加普賢菩薩入此三昧已下顯十如來示現三業此將加相也二所謂已下有十句明加之所為亦名入定所為也第三與智已下正明加分也就前加相之中內外因緣有二子句初云三業加相盧舍本願第一句通前三業皆是外援句也又汝已下第二句內因也內外因緣有二句也若不取三業時但有內外二句也就加所為中有十句前四句外化次四句自行後兩句通化方軌就正加之中應有三業略無初口業也第二意加之中有十一句前五句加世智次二句加第一義諦智後四加化眾生智也摩頂已下第三身加也第二偈頌中有二十行初十一偈嘆普賢三業遍一切處益物後九偈請說法也如是四天已下第三結上也從爾時普賢已下是大段第二正說文也亦是品中第二二正說有二種釋一者直作六分第一舉十智明圓極妙果以不思議為宗第二應用處所寄應以顯真也三名號無邊四明說法無邊五光覺土田眾生無邊六明住復顯理此並是果道也復有一解猶是正宗之說一往有二一者五句領問辭二者答上問也五句者一領依報二領正報三依正合領四領根性此四是領上十句所被及因中三也五云三世諸佛者領上二九十八句真應問告言已答問也就中有二一明十智略顯真果即遠答上問真中九句亦云舉顯用也二就十世界海已下廣明應用處所寄土以顯應也應用義邊即答上應中九句及所被十句處所也乃往已下答因中三句十世界海者寄土顯應寄應顯真亦云舉用顯體也就答初真中有七一明照境十智以表真身也第二出定三明列得道人四列地動五列獻供六如來毛頭光明說偈十四行並嘆三業遍一切處七普賢說二十行偈重顯前旨依下論釋上云序分入定為三昧分三業為加分普告菩薩大眾已下即是本分前定後偈中已有請分初明真中有十句智皆從境為名成敗是境智是真解假言相相對豈有境智也寄言以顯無言寄對以彰無對十句消文如疏如是皆不可思議者非下情所測故云承佛神力舉十智可以知萬故云具足演說亦得云道具足在下十世界海顯依下諸會皆初嘆人法此始舉真智者標果行因也即是顯真耳從彼三昧起者上已出定告眾嘆說十智竟此云始起者以真智理深重入故出也亦可經說之前後也時彼已下第三列得道之人中有二初總別三昧海列此方得道人一切世界已下列他方得道人如來毛頭說十四偈者嘆普賢三業無邊十方益物也文言本願底者如盧舍那本所願時三聚大戒盡虛空遍法界故云願底普賢身相猶如虛空遍法界故云願底普賢身相猶如虛空者等法性也依於如如不依佛國者上如理如下如智如言智會理如智體亦如明法身依於真如之智智是妙本也不依佛國國是化跡也依於如如者嘆真身也現身無量者嘆應身也真身二種一依虛空二依真如也普賢偈應在前但諸佛偈隔故在後第七普賢說偈二十行重顯前旨初十行嘆如來三業益物後十行普賢自嘆三業利物除損得益也從世界海有十種事訖品末是答佛果中第二明法身應用處也上宣應以顯真此說處以表應皆階汲以明義也今辯至足圓果而說世界海者但理藉言顯非藉應跡無以顯本故就世界海中說應用之處以明應身有宣化之益既明應身圓被即亦顯真極之妙非處無以明應非應無以表實故須假處以通應藉應以顯真即遠答應中九句所被十句因中三句合二十二句問也亦可道乃往以下答因中三句就中有五一舉數二列名三解義四釋成世界義五七十偈已下總結十世界義也中有生起十世界義也說世界者如娑婆阿彌陀等起具者成也具八因緣故起應知感佛神力故眾生業行所成也三住者謂依約業為因聖力金剛大龍等為緣也四形者方圓等也五體者謂金銀土石等六莊嚴者謂一寶二寶乃至無量寶也七清淨者謂善知識生波羅蜜等也八佛出世界者謂現三輪壽命長短應化隨所宜等九劫者謂佛剎住可數劫等十壞者緣盡三災等此十總攝一切世界海皆同若一一別說則塵沙因緣但說其八論說壞者說通始終壞據先後故不論也又復始十智初云如來智成敗智彼以顯故不重說亦可先後際斷表始終相盡故不說也中間八事顯其依報明法身亦於中化也自下諸偈皆頌前長行也起具二十行住三十半形十七行半體有十行莊嚴二十行清淨十八偈出世二十行劫世不顯偈依果者果依於因故云依果二人身為正田宅為依依正果而有餘報故云依果也從爾時普賢欲分別開示已下第四釋成世界義就中有二一直先告眾顯本所行二從風輪已下正釋成世界義初中有四子句一直告大眾二總顯往時三別顯往時四顯時中供佛修菩薩行成此世界也但解一蓮華藏世界成義一切皆爾且寄一蓮華世界海以明盧舍那佛本修菩薩行時終阿僧秪微塵數劫之所莊嚴也餘疏云十種風輪者寄表因中十地行也始云初住終於十住地寄風輪者表先際無住行為本也就此成中有八義以釋成世界海之由第一先明風輪持世界二金剛圍山三金剛圍山中地四地中有香水海五明海有諸河為眷屬六河中間平地七明香水上有不可思議性住八就中初不可說香水海中取一據中者名樂光明廣辯佛剎義就中初十三番顯塵數佛剎成世界性次有八番明世界性成香水海所以但就一香水辯十三佛剎者為明一世界性中有眾多佛剎也但解上方則九方同然此明積性以成海積剎以成性也自此以下八番偈皆頌前長行並顯成世界雜事就中但除第五十七偈第六四偈自外六番各二十偈也然積剎成性積性成海多以十為一數下經積十三剎至性八性至海此亦有有次第也以三千世界為一佛剎於一方積十佛剎末為微塵一塵一佛剎十方皆爾積爾所塵數以剎為世界性也故下香水海云從剎至剎塵數也乃至積性成海皆爾此是蓮華藏世界海義也積性成海者數如積剎成性十方皆爾若數三千者從一四天下乃至千百億四天下為一三千成一剎也積性成海義如上自有小剎小海非一定也據大位解有相成剎性海義也此是豎明世界名號以下傍明世界餘九方亦然是佛菩薩常轉法輪處從說偈已下第五重結前四義初四十行頌上起其因緣世界海及住世界海也次有十行頌上體及莊嚴清淨三種世界海義也次六行頌形次二行頌上劫及壞世界二海義也次五行頌上佛出後七偈頌上說世界也今乃領壞在前顯說在後者欲表先後不定萬法皆爾可遣斷常之患也從乃往過去已下品中第三明引證流通又云果不自有由因而尅即遠答上問又彰慈悲心遠益於二世故流通文興也何故名顯證者廣引往普賢菩薩修行時處行成果就故名顯也就中有二一明修行時處二從彼世界過百歲已有佛出世已下明遇佛蒙利初時處中有三一列時節久近二列世界海三列世界性名體相莊嚴其中須彌寶地眾山香水山林樓閣香云及八部城中道場等皆莊嚴世界性體也彼世界已下第二見佛蒙利也就中有二周值佛就初中有四周長行及偈初長行及八偈明莊嚴童子過佛蒙利聲及四人第二長行及九偈明愛見父王與聞法勅國臣民嚴辦欲往第三長行及九偈明愛見父王聞法勅臣民八部詣佛聽法第四長行及九偈列得道五人並如來述成也初中有四一種列佛出世二別列佛名光明益物三愛見大王已下列所度之眾四童子得益仰嘆如來也第二長行及偈中有二一普告國人二嚴辦行具第三長行及偈中有四一王與人天大眾往詣佛所二列修多羅名字多少三聞法得益四偈中勸修勸學第四長行及偈中有二一列大眾得道二如來讚嘆述成授記第二周見佛中有二初直見佛得三昧門第二周聞法得三昧門三百重者表三大阿僧祗劫行行也名號品第三名以定形字以稱德號曰影響今從化主為名故曰名號品佛在已下有二種釋一家解時果中作六分經文一以不思議妙智為宗二寄土顯應此二如上三既有應身名號是故名號品興既有人名理須說法故次第四四諦品興也教不虛設必有所被土境眾生故第五光覺品興生解有由理須往復故次第六明難興也又復一解從此已下第二廣明因果上略此廣也與大涅槃純陀哀嘆對形言方便略明果也心王已下如大眾問品以下廣明果也就初顯果之中始一品明身業益物次四諦一品明口業益物光覺一品明意業也亦名勸解三輪理須往復顯理故明難一品往復顯理使解堅固初中有二一明其序二承佛神力已下正說名號序中有六一列住處二嘆佛德三嘆他方來眾德四作念問五者召眾六文殊受加嘆大眾即是入定分也如是等六句序中義也嘆佛德十句中前四嘆真身後六嘆應亦可通嘆真應也菩薩嘆德中有三章門謂法機對治後三句重釋三門疑問之中大問作四十二句果有十句行有九句隨喜已下十句重問果十句為四十二大問也子問一百二十九問初十句問果次九十句問行因也隨喜為一句不斷如來性兩句通下能除所除八句為十句下重問果有十四中間離出六情根為六句是則為一百二十九句別問也最後為總也亦得作一百三十句問中有料簡在行品初也四十二問初十句總答餘別答也即以神力以下第五集新眾也中有三一懸知物念二現神力三列眾集眾集中一方有八句一列方所二列近遠三列世界名四列佛號五列菩薩六列眷屬七供養供敬八各坐已方從文殊師利已下第六文殊受加也從諸佛子已下品中第二正說也就中有二一總答上問先領上問辭九句果通領恩也何以故已下釋土及化主不同故是以名號說法光覺乃至萬行皆不同也中有三何以故初一釋十方不同二釋三千三釋四天下中有五番初一四天下作本二善護十方者是三千世界三密訓十方者是世界性也四無量十大數者是十蓮華藏世界海也五總結也就第三世界性中東方密訓南方最勇西方離垢北方真實境界東北方呵尼東南方饒益西南方尠少西北方知足下方無求上方解脫音亦名離揣食第四世界海中直東方有十一無量二不可數三不思議四不可稱五無等六無邊七無分齊八不可說九如虛空十等法界東方既爾餘九亦然皆是盧舍那佛所化眾生處亦是蓮華藏世界一佛土也此則答前問果果中九句佛剎等也上盧舍那品中豎解世界就成時語傍義不顯此中傍解世界說時豎語不顯上下二處皆解蓮華藏世界起具因緣為倚互彰名生解故也第五總結也其中雖就四天下十方密訓十大數而積剎成性積性成海彼言猶狹六說而已耳四諦品第四有作無作有為二無為二四也教行及理得云身次口意業也五門境智之別並有所以耳此品答上五句外亦佛所說法示佛剎體二句也就中唯有三周一三千二密訓十方三如虛空等法界盡大數略不顯四天下也與上名號品相似三周廣略說法皆云隨機而說不可盡也然苦集二諦性相是染滅道二諦性相是淨也光覺品此品來意上明身口示現此明意業也又來上二玄談未若即事自此已下十周放光因光睹相示現三輪並佛號剎土說法嘆佛根器眾生此則所化根器眾生覺悟開現也名號是教生四諦是法藥此是根器猶明果義未盡亦可答上佛剎等十句中外化功德勢力示隨佛剎起示成正覺三句也相輪光者表從下向上上眉間放光表上可傳下亦可慈心接下也光天十周感故十也一四天上即見二十八天地方及等法界四天四天上皆尓十周者一娑婆根本坐也十百千萬百萬億十億百億此十周放光也外猶有一億那由他十億那由他百億那由他千億那由他萬億那由他十萬億那由他百萬億那由他一千萬億那由他十千萬億那由他百千萬億那由他第三大數者一世界性二世界海三世界輪四世界圓五世界分別六世界旋七世界轉八世界蓮華九世界須彌十世界相一無量二不可數三不思議四不可稱五無等六無邊七無分齊八不可說九如虛空十等法界此四番大數第一大數中依前初大數法數耳初一周長行中有四句一列東方一切世界二明以此類彼三彼同於此四列一菩薩佛世界及佛號即是第四句中分作三句也下之九周所列乃可寬狹不同其中塵數世界各各所列與此不異也十周長行及偈相似偈如有異此十周說偈皆嘆佛功德為宗旨也前五周各十偈第六十七偈後四周各二十偈十周中初一明文殊勸解亡相莫作存執而知二明如來患盡德備勸眾識知三如來知萬法如幻而俯應六道四用而常寂五勸修勸學六著相者不見佛忘相者見佛七嘆佛法無為勸眾識知八法身方便巧會有無九大慈覆普拔眾生苦十平等大惠而應接群有無來去相行者應知明難品第六上雖明理解解未堅固要假往復故此品興就中有十周長行及偈前三就眾生業報後七寄化主為言最後長行總結前二初一嘆心外有神非能造萬物答以緣假相續無性體空雙破斷常二問若無眾生不應有十隨教化答以相續故有無體故空三問四大造善惡苦樂答以思造業無性故空實法不定空無造也四問會空理一不應用眾答以根不同別故有眾也五問真因是一不應施者報別答以用心不等故別也六問教行觀別不應須二答以教行相藉故須二也七問若聞法斷惑者何故聞而不斷答以依教勤修乃斷八問嘆智為勝不應須九及五四等也答以對相置故須十行偈中分作五分初一行勅聽次一行不見一佛不藉多行成者次一行眾根不同次三行對患故須次四行功用相成故須九也問若唯一乘不假諸法答以器故次須第九九問中初二行顯一佛唯一道下八行去眾根不同故不一也十問佛境界有十一句初云境界二國三所入四所度五隨順智六隨順法七分別智八問識佛境界九問分別知佛境界十問照用十一問境界廣前之十句皆境界略而不著初偈答第一佛境界義第十一亦通去也下之九句次第而答文無隔越最後即是第三長行總結前二眾生化主果分訖淨行品第七此品猶屬人中第二會說六品中前是方便此二是行成也此品來意者有三一遠答上問二明尅果之因三教行相資答問因果可以意得釋第三教行相資者上化主法門光照世界根器眾生並往復顯理生解依興淨行及身口業故此品與焉然上放相輪光明為此一段眾生開覺始行似為外凡邪定及不定聚人也或於想信之耳足下放光明為於下著凡夫人也下昇天品放足指光明表漸進位上昇義也此品始生善根遠諮佛果義復有三一明相資以相無相漏無漏乃至凡之與聖皆是相資相發故經云一念之善直向菩提不受世報故經云一念之善受一切常佛之果不受生滅之果也二明階級次第者五忍十四忍三賢十聖是也三明順而通莫問凡聖願行自利利他一切萬善並通順極故名順通也而一人善惡等分者先受善報惡理在後故以真金牒花曰霜等喻是其事也然就此中長行及偈觀起始終一轍亦從凡至聖立行一周也就中有三一問二答三經長行問中有十一句問一一問中皆含多問無量行相十一句中始九句問三業得一切勝妙功德二次九句淨生報勝也三次九句問生報上惠勝四次八句問發惠之緣五次十句問惠之所除六次十句七覺三空問能體也七次十句問六度四攝能除行相八次十句十力者明能除功用亦名得果也九次十句問八部恭敬十次九句問善菩薩蔭護釋上恭敬最後第十一有七句問導首陰護德善不妄發起必照樂惡不虛起生必感苦因果相當故曰是處若由罪尅慶因善照總因果理差名非是處也生因辨報故云處也力義可知解所達到為至亦可因至於果處也通物為道前至因處此至果處為異也答中有二初長行十句略後偈廣顯長行中初句因後句果第二尊導者除佛為第二也亦可除四依已外為第二也偈中有一百四十行前一十一行顯在家菩薩行願下一百二十九行是出家菩薩行願亦可名世間也此之一位皆據始行為言故從足下光明表始行之人也賢首品第八賢首者以行人目品故云賢首品也經記云賢首剎來故云賢首也上淨行品似如蹹法相而會遍學亦有二行利他行少自利行徧彰此中次第觀行解心成就遍會法相利他行多自利行少菩薩以他業為己業亦是倚互彰名也如聖行品初修戒定惠初自利後利他初淺後深始末一周佛事滿足梵行十功德亦爾初微終著初自利後利他論心三業並屬一眾生也觀此經意似是初行如聖行品初發心憑三寶亦如瓔珞仁王始從發心終於灌頂之無異也而此應在淨行品論賢首辯者以此二品並有菩薩始終行成也亦可倚互而說有解菩薩不同二乘凡夫迭觀興行一發即一切萬行並習故經云一地攝一切地發心畢竟二無別乃至量與羅漢等及量同惠先後際等三日月八日月十五日月並普照無異也就此品偈有七百一十九行分文有二初長行及二偈文殊問賢首菩薩行相義二從賢首答已下正說十三法師及十四忍行相義就賢首答中復分為二初正說三賢十聖願行義二從無畏大士已下明受持流通分也就初復分為二初有十三行明地前三賢菩薩行願第二從深心淨信不可壞已下有六百七十八行明初地已上行願義也前中有三初二勅聽次五行總嘆發心功德不可說五行各別有為也始偈明菩薩發心堅固二偈說之難盡三以少況多四說難究竟前就一佛此就多佛也五說其少分也次有六行明發心因緣內心為因三寶為緣也就中初一總第二所欣第三所背第四所除第五所為第六所得也就第二地上之中初十八行偈以信初地行相也次十行明二地也次三地四地五地六地七地各有八行偈顯其行相次有十六偈明八地行相次十五偈明九地行相法身功德智慧具已下有五百七十九行廣總明第十地行相所為或是外凡內凡而自下乃顯十地行相者欲令始學遠標勝行以勵其懷又解如淨行品初具顯竟此中亦始從發心終於十地亦是始終行就中科文自行外化或以三輪益物實相具辯以為四分初十九行自行彌滿法界二從或有佛剎已下二十四行明外化義也三從若欲供養已下有三十四行重明自行前總此別也四從欲安一切眾生類已下訖不思議劫住有五百二偈廣明大士定道之力於十方界三輪化眾生也中復有二初三百四十四行廣顯大士三業行願種種教化二從一切諸佛皆共說已下有一百五十八行明以下況上何況菩薩無漏道力寧可思量何往不周也亦可以近通遠初中有三初八十三行明以定道力欲十方界三業利物徧成於口業次安隱眾生勝三昧已下一百九十行明以定道力就光明三業以益物徧成於身業三十方世界有緣已下有七十一行明以定道力就三業自在於十方世界以益物徧成於意業尋文三業位別不違詮旨亦可云初就對治以益物二就光明以益物三就自在以益物三皆以定為體以三為用即是體用之意也前三周自行外化者亦不離於體用第二光中有三初二行總次百五十七行如是等比光明門已下三十一行明結勸也三從十已下七十一行明定道之力三業或以神變光明生所或以菩薩心靜一切善惡淨心海中行總次六十七行別後兩行結勸也別中自方中自在次就入等中自在童子身已下天文諸塵空有色心等中自在以下況上中無礙行也無畏大士已下廿六行明顯發流通也錄文完
